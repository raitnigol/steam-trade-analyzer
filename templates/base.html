<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Steam Trade History (Prototype)</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        margin: 16px;
        color: #e8e8e8;
        background: #0b0f14;
      }
      a {
        color: #7dd3fc;
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding-left: 8px;
        padding-right: 8px;
      }
      .flash {
        background: #111827;
        border: 1px solid #334155;
        padding: 10px 12px;
        margin-bottom: 12px;
        border-radius: 8px;
      }
      .muted {
        color: #94a3b8;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      input,
      select {
        background: #0f172a;
        color: #e8e8e8;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 8px 10px;
      }
      button {
        background: #1d4ed8;
        border: 1px solid #1d4ed8;
        color: #ffffff;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        border: 1px solid #334155;
      }
      .trade {
        border: 1px solid #1f2937;
        background: #0f172a;
        border-radius: 12px;
        padding: 12px 14px;
        margin: 10px 0;
      }
      .trade-title {
        display: flex;
        gap: 10px;
        align-items: baseline;
        flex-wrap: wrap;
      }
      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .chip {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        color: #cbd5e1;
      }
      ul.items {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      .items-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }

      .item-card {
        border: 1px solid #334155;
        background: #0f172a;
        border-radius: 12px;
        padding: 8px 10px;
        min-width: 160px;
      }

      /* Item rarity colors (best-effort palette match) */
      .item-card.rarity-consumer {
        border-color: #b0c3d9;
      }
      .item-card.rarity-consumer .item-name {
        color: #b0c3d9;
      }

      .item-card.rarity-industrial {
        border-color: #5e98d9;
      }
      .item-card.rarity-industrial .item-name {
        color: #5e98d9;
      }

      .item-card.rarity-milspec {
        border-color: #4b69ff;
      }
      .item-card.rarity-milspec .item-name {
        color: #4b69ff;
      }

      .item-card.rarity-restricted {
        border-color: #8847ff;
      }
      .item-card.rarity-restricted .item-name {
        color: #8847ff;
      }

      .item-card.rarity-classified {
        border-color: #d32ce6;
      }
      .item-card.rarity-classified .item-name {
        color: #d32ce6;
      }

      .item-card.rarity-covert {
        border-color: #eb4b4b;
      }
      .item-card.rarity-covert .item-name {
        color: #eb4b4b;
      }

      .item-card.rarity-contraband {
        border-color: #e4ae39;
      }
      .item-card.rarity-contraband .item-name {
        color: #e4ae39;
      }

      .item-card.rarity-rare-special {
        border-color: #e4ae39;
      }
      .item-card.rarity-rare-special .item-name {
        color: #e4ae39;
      }

      .item-card.rarity-unknown .rarity-text {
        color: #94a3b8;
      }

      .item-card .rarity-text {
        color: inherit;
      }

      .item-img {
        display: block;
        width: 120px;
        height: 40px;
        object-fit: contain;
        background: transparent;
        border-radius: 8px;
        margin-bottom: 8px;
      }

      .item-img-placeholder {
        width: 120px;
        height: 40px;
        border-radius: 8px;
        margin-bottom: 8px;
        background: #0b1220;
        border: 1px dashed #334155;
        color: #64748b;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 6px;
        box-sizing: border-box;
      }

      .item-name {
        font-size: 13px;
        line-height: 1.25;
        word-break: break-word;
      }

      .item-link {
        display: inline-block;
        margin-top: 6px;
        font-size: 12px;
      }

      .protected-badge {
        vertical-align: middle;
        margin-right: 8px;
      }

      .partner-avatar {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        object-fit: cover;
        border: 1px solid #334155;
        margin-right: 10px;
        vertical-align: middle;
      }

      .partner-avatar-placeholder {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        border: 1px dashed #334155;
        margin-right: 10px;
        vertical-align: middle;
        background: #0f172a;
        color: #94a3b8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        user-select: none;
      }

      .error {
        background: #2a0f12;
        border: 1px solid #7f1d1d;
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Steam Trade History (Prototype)</h1>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="flash">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
